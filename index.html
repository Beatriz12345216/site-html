<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Site teste funcionando</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            text-align: center;
        }

        header {
            background-color: #333;
            color: white;
            padding: 20px;
        }

        main {
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        footer {
            background-color: #333;
            color: white;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>Meu Primeiro Site teste funcionando</h1>
    <p>Hospedado no GitHub Pages</p>
</header>

<main>
    <h2>Bem-vindo!</h2>
    <p>Este é um site simples para teste.</p>
    
    <button onclick="mostrarMensagem()">Clique aqui</button>
    
    <p id="mensagem"></p>
</main>

<footer>
    <p>© 2026 - Meu Site</p>
</footer>

<script>
    function mostrarMensagem() {
        document.getElementById("mensagem").innerText = "Você clicou no botão! 🎉";
    }
</script>

</body>
</html>
